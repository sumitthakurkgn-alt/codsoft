<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#0a0c12;
  --calc:#111520;
  --display:#0d1018;
  --btn:#1a1f2e;
  --btn-hover:#222840;
  --operator:#6c63ff;
  --operator-hover:#7d75ff;
  --equals:#00e5a0;
  --equals-hover:#00ffb3;
  --clear:#ff5f6d;
  --text:#e2e8f0;
  --muted:#6b7a8d;
  --border:#1e2535;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body{
  background:var(--bg); min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background-image:
    radial-gradient(ellipse 50% 50% at 20% 30%, rgba(108,99,255,.1), transparent),
    radial-gradient(ellipse 40% 40% at 80% 70%, rgba(0,229,160,.07), transparent);
}

.calc-wrap{
  background:var(--calc);
  border:1px solid var(--border);
  border-radius:24px;
  padding:28px;
  width:340px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}


.display{
  background:var(--display);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 20px 14px;
  margin-bottom:20px;
  text-align:right;
  min-height:100px;
  display:flex; flex-direction:column; justify-content:flex-end;
}

.expression{
  color:var(--muted);
  font-size:.8rem;
  min-height:18px;
  margin-bottom:6px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.result{
  color:var(--text);
  font-size:2.4rem;
  font-weight:700;
  letter-spacing:-.02em;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  transition:font-size .15s;
}

.result.small{ font-size:1.6rem; }


.buttons{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
}


.btn{
  background:var(--btn);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:1rem;
  font-weight:500;
  padding:18px 0;
  cursor:pointer;
  transition:all .18s;
  user-select:none;
  outline:none;
}

.btn:hover{ background:var(--btn-hover); transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.3); }
.btn:active{ transform:translateY(0); box-shadow:none; }


.btn.op{
  background:rgba(108,99,255,.15);
  color:var(--operator);
  border-color:rgba(108,99,255,.25);
}
.btn.op:hover{ background:rgba(108,99,255,.28); border-color:var(--operator); }


.btn.clear{
  background:rgba(255,95,109,.12);
  color:var(--clear);
  border-color:rgba(255,95,109,.2);
}
.btn.clear:hover{ background:rgba(255,95,109,.24); border-color:var(--clear); }


.btn.equals{
  background:var(--equals);
  color:#060910;
  border-color:var(--equals);
  font-weight:700;
  font-size:1.3rem;
}
.btn.equals:hover{ background:var(--equals-hover); box-shadow:0 8px 24px rgba(0,229,160,.3); }


.btn.zero{ grid-column:span 2; }


.btn.special{ color:var(--muted); font-size:.9rem; }

</style>
</head>
<body>

<div class="calc-wrap">

  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    
    <button class="btn clear"    onclick="clearAll()">AC</button>
    <button class="btn special"  onclick="toggleSign()">+/−</button>
    <button class="btn special"  onclick="percent()">%</button>
    <button class="btn op"       onclick="setOp('/')">÷</button>

    
    <button class="btn" onclick="input('7')">7</button>
    <button class="btn" onclick="input('8')">8</button>
    <button class="btn" onclick="input('9')">9</button>
    <button class="btn op" onclick="setOp('*')">×</button>

    
    <button class="btn" onclick="input('4')">4</button>
    <button class="btn" onclick="input('5')">5</button>
    <button class="btn" onclick="input('6')">6</button>
    <button class="btn op" onclick="setOp('-')">−</button>


    <button class="btn" onclick="input('1')">1</button>
    <button class="btn" onclick="input('2')">2</button>
    <button class="btn" onclick="input('3')">3</button>
    <button class="btn op" onclick="setOp('+')">+</button>

    
    <button class="btn zero" onclick="input('0')">0</button>
    <button class="btn special" onclick="inputDot()">.</button>
    <button class="btn equals" onclick="calculate()">=</button>
  </div>

</div>

<script>

  let current = '0';
  let previous = '';
  let operator = null;
  let fresh = false; 

  const display  = document.getElementById('result');
  const expr     = document.getElementById('expression');

  function updateDisplay(){
    display.textContent = current;
    display.classList.toggle('small', current.length > 9);
  }

  function input(digit){
    if(fresh){ current = digit; fresh = false; }
    else{ current = current === '0' ? digit : current + digit; }
    if(current.length > 12) return;
    updateDisplay();
  }

  function inputDot(){
    if(fresh){ current = '0.'; fresh = false; }
    else if(!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(op){
    if(operator && !fresh) calculate(true);
    previous = current;
    operator = op;
    fresh = true;

    const symbols = {'+':'+', '-':'−', '*':'×', '/':'÷'};
    expr.textContent = previous + ' ' + symbols[op];
  }

  function calculate(chain = false){
    if(!operator || !previous) return;

    let a = parseFloat(previous);
    let b = parseFloat(current);
    let result;

    if(operator === '+') result = a + b;
    else if(operator === '-') result = a - b;
    else if(operator === '*') result = a * b;
    else if(operator === '/'){
      if(b === 0){ current = 'Error'; updateDisplay(); expr.textContent=''; operator=null; return; }
      result = a / b;
    }

    
    result = parseFloat(result.toPrecision(12));

    if(!chain){
      const symbols = {'+':'+', '-':'−', '*':'×', '/':'÷'};
      expr.textContent = previous + ' ' + symbols[operator] + ' ' + current + ' =';
      operator = null;
    }

    current = String(result);
    previous = current;
    fresh = true;
    updateDisplay();
  }

  function clearAll(){
    current = '0'; previous = ''; operator = null; fresh = false;
    expr.textContent = '';
    updateDisplay();
  }

  function toggleSign(){
    if(current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent(){
    if(current === 'Error') return;
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  
  document.addEventListener('keydown', e => {
    if(e.key >= '0' && e.key <= '9') input(e.key);
    else if(e.key === '.') inputDot();
    else if(e.key === '+') setOp('+');
    else if(e.key === '-') setOp('-');
    else if(e.key === '*') setOp('*');
    else if(e.key === '/') { e.preventDefault(); setOp('/'); }
    else if(e.key === 'Enter' || e.key === '=') calculate();
    else if(e.key === 'Escape') clearAll();
    else if(e.key === 'Backspace'){
      if(current.length > 1) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
  });

</script>
</body>
</html>
